services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: traininglab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: traininglab
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://traininglab:{POSTGRES_PASSWORD}@db:5432/traininglab
    ports:
      - "8000:8000"

volumes:
  db_data: